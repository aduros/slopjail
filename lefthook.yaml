output: false

pre-commit:
  commands:
    lint:
      run: npx oxlint --disable-nested-config --fix
      stage_fixed: true
    format:
      run: npx oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    test:
      glob: "*.{js,ts,jsx,tsx,mjs,mts}"
      run: npx vitest related --run --bail {staged_files}
